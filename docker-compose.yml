services:
  compilador-llvm:
    build: .
    container_name: compilador_llvm_demo
    volumes:
      # Monta a pasta local no container (desenvolvimento)
      - .:/workspace
      # Permite salvar os gráficos gerados
      - ./output:/workspace/output
    working_dir: /workspace
    stdin_open: true   # Mantém o container rodando para terminal interativo
    tty: true
    environment:
      - TERM=xterm-256color