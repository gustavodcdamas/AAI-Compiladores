name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test Compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: compilador-test:latest
      
      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && [ -f "scripts/run-tests.sh" ]; then
            docker run --rm compilador-test:latest \
              /bin/bash -c "./scripts/run-tests.sh --unit"
          else
            echo "⚠️ Skipping unit tests (directory or script not found)"
          fi
      
      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            docker run --rm compilador-test:latest \
              /bin/bash -c "for test in /workspace/tests/integration/*.c; do \
                if [ -f \"\$test\" ]; then \
                  clang -S -emit-llvm \"\$test\" -o /tmp/test.ll && \
                  lli /tmp/test.ll || exit 1; \
                fi \
              done"
          else
            echo "⚠️ Skipping integration tests (directory not found)"
          fi
      
      - name: Benchmark tests
        run: |
          if [ -f "tests/benchmark/matrix.c" ]; then
            docker run --rm compilador-test:latest \
              /bin/bash -c "clang tests/benchmark/matrix.c -o /tmp/matrix && /tmp/matrix"
          else
            echo "⚠️ Skipping benchmark tests (matrix.c not found)"
          fi

  build-scan-push:
    name: Build, Scan & Push
    needs: test
    if: success()
    runs-on: ubuntu-latest
    
    env:
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      REPO_NAME: ${{ github.event.repository.name }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
      IMAGE_TAG: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest

      - name: Run Trivy
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Generate Trivy JSON report
        if: always()
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format json \
            --output trivy-report.json \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Send notifications
        if: always()
        uses: ./.github/actions/send-mailgun-report
        with:
          api-key: ${{ secrets.MAILGUN_API_KEY }}
          domain: ${{ secrets.MAILGUN_DOMAIN }}
          from: ${{ secrets.MAILGUN_FROM_EMAIL }}
          to: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
          subject: "Relatório Pipeline Compilador - ${{ steps.status.outputs.deploy_status_text }}"
          status: ${{ steps.status.outputs.deploy_status }}
          build-id: ${{ github.run_id }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          repo-name: ${{ github.repository }}
          deploy-status-text: ${{ steps.status.outputs.deploy_status_text }}
          trivy-report: trivy-report.json
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 🔧 CORREÇÃO 2: Não falha em falso positivo (opcional)
        # with:
        #   fail-on-found: false

      - name: Push to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔧 CORREÇÃO 3: Upload do JSON gerado
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7
