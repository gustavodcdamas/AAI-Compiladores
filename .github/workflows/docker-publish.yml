name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test Compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: compilador-test:latest
      
      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && [ -f "scripts/run-tests.sh" ]; then
            docker run --rm compilador-test:latest \
              /bin/bash -c "./scripts/run-tests.sh --unit"
          else
            echo "⚠️ Skipping unit tests"
          fi

  build-scan-push:
    name: Build, Scan & Push
    needs: test
    if: success()
    runs-on: ubuntu-latest
    
    env:
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      # 🔧 CORREÇÃO 1: Normalizar nome do repositório para lowercase
      REPO_NAME: ${{ github.event.repository.name }}
      REPO_NAME_LOWER: ${{ github.event.repository.name == 'AAI-Compiladores' && 'aai-compiladores' || github.event.repository.name }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aai-compiladores
      IMAGE_TAG: latest

    steps:
      # 🔧 CORREÇÃO 2: Checkout ANTES de usar a action customizada
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔧 CORREÇÃO 3: Build com nome em lowercase
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔧 CORREÇÃO 4: Trivy via Docker (não precisa instalar)
      - name: Run Trivy vulnerability scanner (table)
        id: trivy
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          # Salva o exit code
          echo "trivy_exit_code=$?" >> $GITHUB_OUTPUT

      # 🔧 CORREÇÃO 5: Gerar JSON (mesmo se falhar)
      - name: Generate Trivy JSON report
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format json \
            --output /workspace/trivy-report.json \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

      # Determinar status do deploy
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ steps.trivy.outputs.trivy_exit_code }}" == "0" ]; then
            echo "deploy_status=success" >> $GITHUB_OUTPUT
            echo "deploy_status_emoji=✅" >> $GITHUB_OUTPUT
            echo "deploy_status_text=SUCESSO" >> $GITHUB_OUTPUT
          else
            echo "deploy_status=failed" >> $GITHUB_OUTPUT
            echo "deploy_status_emoji=❌" >> $GITHUB_OUTPUT
            echo "deploy_status_text=FALHA" >> $GITHUB_OUTPUT
          fi

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # 🔧 CORREÇÃO 6: Push condicional (só se scan passou)
      - name: Push to Docker Hub
        if: steps.status.outputs.deploy_status == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔧 CORREÇÃO 7: Notificações (executa sempre)
      - name: Send notifications
        if: always()
        uses: ./.github/actions/send-report
        with:
          api-key: ${{ secrets.MAILGUN_API_KEY }}
          domain: ${{ secrets.MAILGUN_DOMAIN }}
          from: ${{ secrets.MAILGUN_FROM_EMAIL }}
          to: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
          subject: "Relatório Pipeline Compilador - ${{ steps.status.outputs.deploy_status_text }}"
          status: ${{ steps.status.outputs.deploy_status }}
          build-id: ${{ github.run_id }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          repo-name: ${{ github.repository }}
          deploy-status-text: ${{ steps.status.outputs.deploy_status_text }}
          trivy-report: trivy-report.json
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7
