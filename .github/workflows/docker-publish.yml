name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test Compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: compilador-test:latest
      
      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && [ -f "scripts/run-tests.sh" ]; then
            docker run --rm compilador-test:latest \
              /bin/bash -c "./scripts/run-tests.sh --unit"
          else
            echo "Pulando testes unitarios"
          fi

  build-scan-push:
    name: Build, Scan & Push
    needs: test
    if: success()
    runs-on: ubuntu-latest
    
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aai-compiladores
      IMAGE_TAG: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (table)
        id: trivy
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          echo "trivy_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate Trivy JSON report
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format json \
            --output /workspace/trivy-report.json \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ steps.trivy.outputs.trivy_exit_code }}" == "0" ]; then
            echo "deploy_status=success" >> $GITHUB_OUTPUT
            echo "deploy_status_emoji=✅" >> $GITHUB_OUTPUT
            echo "deploy_status_text=SUCESSO" >> $GITHUB_OUTPUT
          else
            echo "deploy_status=failed" >> $GITHUB_OUTPUT
            echo "deploy_status_emoji=❌" >> $GITHUB_OUTPUT
            echo "deploy_status_text=FALHA" >> $GITHUB_OUTPUT
          fi

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Setup WireGuard VPN (GitHub Actions specific)
        run: |
          echo "Configurando WireGuard VPN para GitHub Actions..."
          
          # Instala WireGuard
          sudo apt-get update
          sudo apt-get install -y wireguard wireguard-tools resolvconf
          
          # Cria o arquivo de configuração a partir do secret
          echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          
          # Sobe a interface VPN
          sudo wg-quick up wg0
          
          # Aguarda conexão
          sleep 10
          
          # Verifica se o IP atribuído é o correto
          echo "Interface WireGuard:"
          sudo wg show
          echo ""
          echo "IP da VPN:"
          ip addr show wg0 | grep inet
          
          # Testa conectividade
          echo ""
          echo "Testando rota via VPN..."
          if curl -s --max-time 10 --interface wg0 https://api.mailgun.net/v3/domains -I 2>/dev/null | grep -q "200\|401"; then
            echo "Mailgun acessível via VPN!"
          else
            echo "Não foi possível acessar Mailgun via VPN"
          fi
          
          # Mostra o IP público (deve ser o IP do servidor VPN)
          echo "IP Público (via VPN): $(curl -s --interface wg0 ifconfig.me 2>/dev/null || echo 'falhou')"
          
          echo "VPN configurada com sucesso!"

      - name: Send notifications
        if: always()
        uses: ./.github/actions/send-report
        with:
          api-key: ${{ secrets.MAILGUN_API_KEY }}
          domain: ${{ secrets.MAILGUN_DOMAIN }}
          from: ${{ secrets.MAILGUN_FROM_EMAIL }}
          to: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
          subject: "Relatório Pipeline Compilador - ${{ steps.status.outputs.deploy_status_text }}"
          status: ${{ steps.status.outputs.deploy_status }}
          build-id: ${{ github.run_id }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          repo-name: ${{ github.repository }}
          deploy-status-text: ${{ steps.status.outputs.deploy_status_text }}
          trivy-report: trivy-report.json
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Push to Docker Hub
        if: steps.status.outputs.deploy_status == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Disconnect VPN (cleanup)
        if: always()
        run: |
          sudo wg-quick down wg0 2>/dev/null || true
          echo "PN desconectada"
