name: 'Send Mailgun Email Report'
description: 'Envia relatório do pipeline via Mailgun com anexo'

inputs:
  api-key:
    description: 'Mailgun API Key'
    required: true
  domain:
    description: 'Mailgun Domain'
    required: true
  from:
    description: 'From email address'
    required: true
  to:
    description: 'To email address'
    required: true
  subject:
    description: 'Email subject'
    required: true
  status:
    description: 'Deployment status (success/failed)'
    required: true
  build-id:
    description: 'GitHub Run ID'
    required: true
  commit-sha:
    description: 'Commit SHA'
    required: true
  actor:
    description: 'GitHub Actor'
    required: true
  repo-name:
    description: 'Repository name'
    required: true
    default: 'unknown/repo'
  deploy-status-text:
    description: 'Deployment status text'
    required: false
    default: 'Status desconhecido'
  trivy-report:
    description: 'Path to Trivy JSON report'
    required: false
    default: ''
  telegram-chat-id:
    description: 'Telegram Chat ID'
    required: false
    default: ''
  telegram-bot-token:
    description: 'Telegram Bot Token'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install jq
      shell: bash
      run: |
        if ! command -v jq &> /dev/null; then
          echo "Installing jq..."
          sudo apt-get update && sudo apt-get install -y jq
        fi

    - name: Prepare email content
      id: prepare
      shell: bash
      run: |
        if [[ "${{ inputs.status }}" == "success" ]]; then
          STATUS_COLOR="#2cbe4e"
          STATUS_TEXT="✅ SUCESSO"
        else
          STATUS_COLOR="#e03a3a"
          STATUS_TEXT="❌ FALHA"
        fi
        
        CURRENT_DATE=$(date '+%d/%m/%Y %H:%M:%S')
        
        cat > /tmp/email.html << HTML
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                body { font-family: Arial, sans-serif; }
                .header { background-color: ${STATUS_COLOR}; color: white; padding: 20px; text-align: center; }
                .content { padding: 20px; background: #f5f5f5; }
                .footer { font-size: 12px; text-align: center; margin-top: 20px; color: #666; }
                table { width: 100%; border-collapse: collapse; }
                td { padding: 8px; }
                .label { font-weight: bold; width: 30%; }
            </style>
        </head>
        <body>
            <div class="header">
                <h2>Relatório do Pipeline - Compilador LLVM</h2>
                <p>Status: ${STATUS_TEXT}</p>
            </div>
            <div class="content">
                <h3>Informações do Build</h3>
                <table>
                    <tr><td class="label">Build ID:</td><td>${{ inputs.build-id }}</td></tr>
                    <tr><td class="label">Commit:</td><td><code>${{ inputs.commit-sha }}</code></td></tr>
                    <tr><td class="label">Autor:</td><td>${{ inputs.actor }}</td></tr>
                    <tr><td class="label">Data:</td><td>${CURRENT_DATE}</td></tr>
                    <tr><td class="label">Repositório:</td><td>${{ inputs.repo-name }}</td></tr>
                </table>
                <p><a href="https://github.com/${{ inputs.repo-name }}/actions/runs/${{ inputs.build-id }}">🔗 Ver detalhes no GitHub</a></p>
            </div>
            <div class="footer">
                <p>E-mail automático gerado pelo GitHub Actions.</p>
            </div>
        </body>
        </html>
        HTML
        
        echo "Email HTML preparado em /tmp/email.html"

    - name: Send email via Mailgun API
      shell: bash
      run: |
        echo "📧 Enviando e-mail via Mailgun..."
        echo "📬 Domínio: ${{ inputs.domain }}"
        echo "📬 Destinatário: ${{ inputs.to }}"
        
        CURL_CMD="curl -s -X POST \"https://api.mailgun.net/v3/${{ inputs.domain }}/messages\" \
          -u \"api:${{ inputs.api-key }}\" \
          -F \"from=${{ inputs.from }}\" \
          -F \"to=${{ inputs.to }}\" \
          -F \"subject=${{ inputs.subject }}\" \
          -F \"html=</tmp/email.html\""
        
        if [[ -f "${{ inputs.trivy-report }}" ]]; then
          echo "Anexando relatório: ${{ inputs.trivy-report }}"
          CURL_CMD="$CURL_CMD -F \"attachment=@${{ inputs.trivy-report }}\""
        fi
        
        RESPONSE=$(eval $CURL_CMD 2>&1)
        echo "Resposta do Mailgun: $RESPONSE"
        
        if echo "$RESPONSE" | grep -q '"message": "Queued. Thank you."'; then
          echo "✅ E-mail enviado com sucesso e aceito pela fila do Mailgun!"
        elif echo "$RESPONSE" | grep -q '"message": "Queued'; then
          echo "✅ E-mail aceito pela fila do Mailgun!"
        elif echo "$RESPONSE" | grep -q '"error"'; then
          echo "❌ Erro no envio do e-mail: $RESPONSE"
        else
          echo "✅ E-mail processado pelo Mailgun! Resposta: $RESPONSE"
        fi

    - name: Send Telegram notification via curl
      if: inputs.telegram-chat-id != '' && inputs.telegram-bot-token != ''
      shell: bash
      run: |
        echo "Enviando notificação via Telegram..."
        
        MESSAGE="🚀 *Pipeline Compilador LLVM*%0A%0A"
        MESSAGE="${MESSAGE}📊 *Status:* ${{ inputs.deploy-status-text }}%0A"
        MESSAGE="${MESSAGE}📦 *Build:* ${{ inputs.build-id }}%0A"
        MESSAGE="${MESSAGE}🔖 *Commit:* \`${{ inputs.commit-sha }}\`%0A"
        MESSAGE="${MESSAGE}👤 *Autor:* ${{ inputs.actor }}%0A%0A"
        MESSAGE="${MESSAGE}🔗 [Ver detalhes](https://github.com/${{ inputs.repo-name }}/actions/runs/${{ inputs.build-id }})"
        
        RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ inputs.telegram-bot-token }}/sendMessage" \
          -d "chat_id=${{ inputs.telegram-chat-id }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown" \
          -d "disable_web_page_preview=false")
        
        if echo "$RESPONSE" | grep -q '"ok":true'; then
          echo "Notificação Telegram enviada com sucesso!"
        else
          echo "Falha no Telegram: $RESPONSE"
        fi

    - name: Send detailed report to Telegram
      if: inputs.telegram-chat-id != '' && inputs.telegram-bot-token != '' && inputs.trivy-report != ''
      shell: bash
      run: |
        echo "📎 Enviando relatório para Telegram..."
        
        CAPTION="📋 *Relatório Trivy Scan*%0A"
        CAPTION="${CAPTION}Build #${{ inputs.build-id }}%0A"
        CAPTION="${CAPTION}Status: ${{ inputs.deploy-status-text }}"
        
        RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ inputs.telegram-bot-token }}/sendDocument" \
          -F "chat_id=${{ inputs.telegram-chat-id }}" \
          -F "document=@${{ inputs.trivy-report }}" \
          -F "caption=${CAPTION}" \
          -F "parse_mode=Markdown")
        
        if echo "$RESPONSE" | grep -q '"ok":true'; then
          echo "Relatório Telegram enviado com sucesso!"
        else
          echo "Falha ao enviar relatório: $RESPONSE"
        fi
