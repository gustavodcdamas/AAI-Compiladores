name: 'Send Mailgun Email Report'
description: 'Envia relatório do pipeline via Mailgun com anexo'

inputs:
  api-key:
    description: 'Mailgun API Key'
    required: true
  domain:
    description: 'Mailgun Domain'
    required: true
  from:
    description: 'From email address'
    required: true
  to:
    description: 'To email address'
    required: true
  subject:
    description: 'Email subject'
    required: true
  status:
    description: 'Deployment status (success/failed)'
    required: true
  build-id:
    description: 'GitHub Run ID'
    required: true
  commit-sha:
    description: 'Commit SHA'
    required: true
  actor:
    description: 'GitHub Actor'
    required: true
  repo-name:
    description: 'Repository name (ex: user/repo)'
    required: true
    default: 'unknown/repo'
  deploy-status-text:
    description: 'Deployment status text'
    required: false
    default: 'Status desconhecido'
  trivy-report:
    description: 'Path to Trivy JSON report'
    required: false
    default: ''
  telegram-chat-id:
    description: 'Telegram Chat ID'
    required: false
    default: ''
  telegram-bot-token:
    description: 'Telegram Bot Token'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install jq
      shell: bash
      run: |
        if ! command -v jq &> /dev/null; then
          echo "Installing jq..."
          sudo apt-get update && sudo apt-get install -y jq
        fi

    - name: Prepare email content
      id: prepare
      shell: bash
      run: |
        if [[ "${{ inputs.status }}" == "success" ]]; then
          STATUS_COLOR="#2cbe4e"
          STATUS_TEXT="✅ SUCESSO"
        else
          STATUS_COLOR="#e03a3a"
          STATUS_TEXT="❌ FALHA"
        fi
        
        CURRENT_DATE=$(date '+%d/%m/%Y %H:%M:%S')
        
        cat > email.html << HTML
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                body { font-family: Arial, sans-serif; }
                .header { background-color: ${STATUS_COLOR}; color: white; padding: 20px; text-align: center; }
                .content { padding: 20px; background: #f5f5f5; }
                .footer { font-size: 12px; text-align: center; margin-top: 20px; color: #666; }
                table { width: 100%; border-collapse: collapse; }
                td { padding: 8px; }
                .label { font-weight: bold; width: 30%; }
            </style>
        </head>
        <body>
            <div class="header">
                <h2>Relatório do Pipeline - Compilador LLVM</h2>
                <p>Status: ${STATUS_TEXT}</p>
            </div>
            <div class="content">
                <h3>📋 Informações do Build</h3>
                <table>
                    <tr><td class="label">Build ID:</td><td>${{ inputs.build-id }}</td></tr>
                    <tr><td class="label">Commit:</td><td><code>${{ inputs.commit-sha }}</code></td></tr>
                    <tr><td class="label">Autor:</td><td>${{ inputs.actor }}</td></tr>
                    <tr><td class="label">Data:</td><td>${CURRENT_DATE}</td></tr>
                    <tr><td class="label">Repositório:</td><td>${{ inputs.repo-name }}</td></tr>
                </table>
                <p><a href="https://github.com/${{ inputs.repo-name }}/actions/runs/${{ inputs.build-id }}">🔗 Ver detalhes no GitHub</a></p>
            </div>
            <div class="footer">
                <p>E-mail automático gerado pelo GitHub Actions.</p>
            </div>
        </body>
        </html>
        HTML
        
        echo "✅ Email HTML preparado"

    - name: Send email via Mailgun API
      shell: bash
      run: |
        echo "📧 Enviando e-mail via Mailgun..."
        
        CURL_CMD="curl -s -X POST \"https://api.mailgun.net/v3/${{ inputs.domain }}/messages\" \
          -u \"api:${{ inputs.api-key }}\" \
          -F \"from=${{ inputs.from }}\" \
          -F \"to=${{ inputs.to }}\" \
          -F \"subject=${{ inputs.subject }}\" \
          -F \"html=<email.html\""
        
        if [[ -f "${{ inputs.trivy-report }}" ]]; then
          echo "📎 Anexando relatório: ${{ inputs.trivy-report }}"
          CURL_CMD="$CURL_CMD -F \"attachment=@${{ inputs.trivy-report }}\""
        fi
        
        RESPONSE=$(eval $CURL_CMD)
        echo "📬 Resposta do Mailgun: $RESPONSE"
        
        if echo "$RESPONSE" | grep -q '"message": "Queued. Thank you."'; then
          echo "✅ E-mail enviado com sucesso!"
        else
          echo "❌ Falha no envio do e-mail: $RESPONSE"
          echo "⚠️ Continuando pipeline (erro não crítico)"
        fi

    - name: Send Telegram notification
      if: inputs.telegram-chat-id != '' && inputs.telegram-bot-token != ''
      uses: appleboy/telegram-action@v1
      with:
        to: ${{ inputs.telegram-chat-id }}
        token: ${{ inputs.telegram-bot-token }}
        message: |
          🚀 **Pipeline Compilador LLVM**
          
          📊 **Status:** ${{ inputs.deploy-status-text }}
          📦 **Build:** ${{ inputs.build-id }}
          🔖 **Commit:** `${{ inputs.commit-sha }}`
          👤 **Autor:** ${{ inputs.actor }}
          
          🔗 **Detalhes:** https://github.com/${{ inputs.repo-name }}/actions/runs/${{ inputs.build-id }}

    - name: Send detailed report to Telegram
      if: inputs.telegram-chat-id != '' && inputs.telegram-bot-token != '' && inputs.trivy-report != ''
      uses: appleboy/telegram-action@v1
      with:
        to: ${{ inputs.telegram-chat-id }}
        token: ${{ inputs.telegram-bot-token }}
        document: ${{ inputs.trivy-report }}
        caption: |
          📋 **Relatório Trivy Scan**
          
          Build #${{ inputs.build-id }}
          Status: ${{ inputs.deploy-status-text }}
